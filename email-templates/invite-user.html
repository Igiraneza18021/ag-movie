<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Invited</title>
  <style>
    body { background-color: #080808; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; color: #ffffff; -webkit-font-smoothing: antialiased; }
    .wrapper { width: 100%; table-layout: fixed; background-color: #080808; padding-bottom: 40px; }
    .container { max-width: 600px; margin: 40px auto; background-color: #121212; border-radius: 32px; border: 1px solid rgba(255, 255, 255, 0.05); text-align: center; overflow: hidden; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); }
    .content { padding: 50px 40px; }
    .logo-container { margin-bottom: 40px; display: inline-block; padding: 20px; background: rgba(255, 255, 255, 0.03); border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.05); }
    h1 { font-size: 36px; font-weight: 900; text-transform: uppercase; letter-spacing: -1.5px; margin: 0 0 15px 0; line-height: 1; }
    .accent { color: #0071eb; }
    p { color: #a1a1aa; font-size: 18px; line-height: 1.6; margin: 0 0 40px 0; font-weight: 500; }
    .button { background-color: #0071eb; color: #ffffff !important; text-decoration: none; padding: 20px 45px; border-radius: 16px; font-weight: 900; text-transform: uppercase; font-size: 14px; letter-spacing: 1px; display: inline-block; box-shadow: 0 15px 35px rgba(0, 113, 235, 0.4); }
    .footer { padding: 30px; background-color: rgba(0, 0, 0, 0.2); font-size: 11px; color: #52525b; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="container">
      <div class="content">
        <div class="logo-container">
          <img src="https://ag.micorp.pro/image.png" width="70" height="70" alt="Agasobanuye Movies">
        </div>
        
        <h1>Join the <span class="accent">Community</span></h1>
        <p>You've been invited to join the Agasobanuye Movies platform. Experience the best translated films and TV shows today.</p>

        <a href="{{ .ConfirmationURL }}" class="button">Accept Invitation</a>
      </div>

      <div class="footer">
        &copy; 2026 Agasobanuye Movies &bull; All Rights Reserved
      </div>
    </div>
  </div>
</body>
</html>
